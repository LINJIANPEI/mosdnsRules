name: 每日规则更新

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-rules:                     # Job ID 必须用英文
    name: 更新规则                   # 显示名称支持中文（可选）
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: npm ci

      - name: 执行下载和合并去重脚本
        run: node init.js

      - name: 提交并推送更新后的规则文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rule/
          git add file/      # 如不需要可删除
          git diff --staged --quiet || git commit -m "chore: 自动更新规则文件 $(date +'%Y-%m-%d %H:%M:%S')"
          git push