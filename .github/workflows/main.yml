name: 每日规则更新

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# 关键：提升默认 GITHUB_TOKEN 的权限
permissions:
  contents: write

jobs:
  update-rules:
    name: 更新规则
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: npm ci

      - name: 执行下载和合并去重脚本
        run: node init.js

      - name: 检查是否有更新
        id: check_update
        run: |
          git add rule/
          if git diff --staged --quiet; then
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "⚠️ 规则文件无变化，跳过后续步骤"
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到规则文件更新"
          fi

      - name: 提交并推送更新
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: 自动更新规则文件 $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: 打包 rule 文件夹
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          zip -r rule.zip rule/

      - name: 生成 Release 信息
        id: release_info
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          TAG="rule-$(date +'%Y%m%d-%H%M%S')"
          NAME="规则更新 $(date +'%Y-%m-%d %H:%M:%S')"
          BODY="自动更新的规则文件%0A%0A📅 更新时间：$(date +'%Y-%m-%d %H:%M:%S')%0A🔗 提交：${{ github.sha }}"
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          # body 用环境变量传递，避免换行问题
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "自动更新的规则文件" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "📅 更新时间：$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "🔗 提交：${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建 Release
        if: steps.check_update.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          body: ${{ steps.release_info.outputs.BODY }}
          files: |
            rule.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
